<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="admin-body">

  <div class="container py-5">
    <div class="admin-header d-flex justify-content-between align-items-center mb-4">
      <h2 class="mb-0">Admin Dashboard</h2>
      <a href="/" class="btn btn-dark">View Website</a>
    </div>

    <!-- LOGIN CARD -->
    <div class="card admin-login-card mb-4" id="loginCard">
      <div class="card-body">
        <h4 class="mb-3">Admin Login</h4>
        <form id="loginForm" class="row g-3">
          <div class="col-md-5">
            <input type="text" id="loginUsername" class="form-control" placeholder="Username" value="admin" required />
          </div>
          <div class="col-md-5">
            <input type="password" id="loginPassword" class="form-control" placeholder="Password" value="admin123"
              required />
          </div>
          <div class="col-md-2">
            <button type="submit" class="btn btn-warning w-100">Login</button>
          </div>
        </form>
        <div id="loginMsg" class="mt-2"></div>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboardArea" style="display:none;">
      <div class="row g-4">
        <!-- PRODUCT -->
        <div class="col-lg-6">
          <div class="card admin-card h-100">
            <div class="card-body">
              <h4 class="mb-3">Product Management</h4>

              <form id="productForm">
                <input type="hidden" id="productId" />

                <input type="text" id="name" class="form-control mb-2" placeholder="Product Name" required />

                <input type="text" id="category" class="form-control mb-2" placeholder="Category" />

                <input type="number" step="0.01" id="price" class="form-control mb-2" placeholder="Price" required />

                <input type="text" id="image" class="form-control mb-2" placeholder="Image URL" />

                <textarea id="description" class="form-control mb-3" rows="3" placeholder="Description"></textarea>

                <div class="d-flex gap-2">
                  <button type="submit" class="btn btn-dark w-100">Save Product</button>
                  <button type="button" id="clearProductBtn" class="btn btn-secondary w-100">Clear</button>
                </div>
              </form>

              <div class="table-responsive mt-4">
                <table class="table table-bordered align-middle" id="productTable"></table>
              </div>
            </div>
          </div>
        </div>

        <!-- TESTIMONIAL -->
        <div class="col-lg-6">
          <div class="card admin-card h-100">
            <div class="card-body">
              <h4 class="mb-3">Testimonial Management</h4>

              <form id="testForm">
                <input type="hidden" id="testId" />

                <input type="text" id="tname" class="form-control mb-2" placeholder="Client Name" required />

                <input type="text" id="trole" class="form-control mb-2" placeholder="Role / Profession" />

                <textarea id="message" class="form-control mb-3" rows="5" placeholder="Message" required></textarea>

                <div class="d-flex gap-2">
                  <button type="submit" class="btn btn-warning w-100">Save Testimonial</button>
                  <button type="button" id="clearTestBtn" class="btn btn-secondary w-100">Clear</button>
                </div>
              </form>

              <div class="table-responsive mt-4">
                <table class="table table-bordered align-middle" id="testTable"></table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="admin.js"></script>
</body>

</html>
